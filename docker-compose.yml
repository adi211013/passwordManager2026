services:
  db:
    image: postgres:15-alpine
    container_name: password_manager_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: passmanager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: .
    container_name: passmanager-backend
    restart: always
    ports:
      - "18080:18080"
    env_file:
      - .env
    environment:
      - DB_CONN_STR=dbname=passmanager user=admin password=admin host=db port=5432
    depends_on:
      - db

volumes:
  pgdata: